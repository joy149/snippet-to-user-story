[pytest]
# Only the pure-logic modules (github_context.py, pipeline_utils.py) are covered here.
# app.py itself is intentionally NOT imported by the test suite: it builds Streamlit
# UI elements (st.set_page_config, sidebar widgets, etc.) at module import time, which
# requires a running Streamlit script context and isn't safe/meaningful to import bare
# in a test process. Its pure helper logic is factored out into pipeline_utils.py
# specifically so it CAN be tested — see test_pipeline_utils.py.
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    integration: hits real external services (e.g. the live GitHub API); skipped by default, run explicitly with `pytest -m integration`
